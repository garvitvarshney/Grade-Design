<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0A0A">
  <title>Grade-Design</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
:root{--bg:#0A0A0A;--sf:#141414;--bd:#222222;--ink:#F2EFE9;--ink2:#8A8680;--ink3:#5a5550;--st:max(12px,env(safe-area-inset-top));--sb:max(12px,env(safe-area-inset-bottom))}
*{box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:15px;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;background:var(--bg)}
.nav{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 18px;height:calc(52px+var(--st));display:flex;align-items:flex-end;gap:8px;flex-shrink:0;padding-top:var(--st)}
.nav-logo{font-family:'DM Serif Display',Georgia;font-size:19px;font-style:italic;font-weight:500;color:var(--ink)}
.nav-logo span{color:var(--ink2)}
.nav-tagline{font-size:9px;color:var(--ink2);letter-spacing:.06em;text-transform:uppercase;margin-left:auto}
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--bd);background:var(--sf);flex-shrink:0}
.tab{flex:1;padding:12px;text-align:center;font-size:12px;font-weight:500;color:var(--ink2);border-bottom:2px solid transparent;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tab.on{color:var(--ink);border-color:var(--ink)}
#tabs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px;padding-bottom:var(--sb)}
.tab-page{display:none}
.tab-page.on{display:block}
.sec-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);margin:0 0 10px 0}
.action-row{display:flex;gap:8px;margin:12px 0}
.btn-rnd{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:12px;color:var(--ink);padding:12px;font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-rnd:active{opacity:.6}
.btn-gen{flex:1;background:var(--ink);color:#0A0A0A;border:none;border-radius:12px;padding:12px;font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.btn-gen:disabled{opacity:.3}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.cg-btn{padding:10px 8px;background:var(--sf);border:2px solid var(--bd);border-radius:10px;color:var(--ink2);font-size:11px;font-weight:500;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cg-btn.on{border-color:var(--ink);color:var(--ink);background:rgba(212,166,84,.1)}
.col-result{display:none;margin-top:12px}
.col-result.on{display:block}
.col-result-wrap{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:12px;position:relative}
.col-result-wrap canvas{width:100%;height:auto;display:block}
.col-spin-ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,.65);align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:10}
.col-spin-ov.on{display:flex}
.col-spin-ov .sk-r{width:22px;height:22px;border:2.5px solid rgba(255,255,255,.2);border-top-color:var(--ink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.col-dl-btn{font-size:13px;font-weight:600;background:var(--ink);color:#0A0A0A;border:none;border-radius:12px;padding:14px;width:100%;cursor:pointer}
.c-carousel{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;gap:0;margin-bottom:12px}
.c-slide{width:100vw;padding:0 18px;flex-shrink:0;scroll-snap-stop:always;display:flex;flex-direction:column;gap:10px}
.c-img{width:100%;aspect-ratio:1;background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.c-img canvas{max-width:100%;max-height:100%;display:block}
.dots{display:flex;gap:6px;justify-content:center;padding:12px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ink3);cursor:pointer}
.dot.on{background:var(--ink);width:16px;border-radius:3px}
.ratio-strip{display:flex;gap:4px;overflow-x:auto;padding:10px 0;-webkit-overflow-scrolling:touch}
.ratio-btn{flex-shrink:0;padding:6px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;font-size:10px;cursor:pointer;color:var(--ink2);white-space:nowrap}
.ratio-btn.on{border-color:var(--ink);color:var(--ink);background:rgba(212,166,84,.1)}
#txt-panel{position:fixed;bottom:var(--sb);left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);max-height:65vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s;z-index:40;padding-top:12px;border-radius:20px 20px 0 0;overflow-y:auto}
#txt-panel.on{transform:translateY(0)}
#tp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:39}
#tp-overlay.on{display:block}
.tp-handle{width:32px;height:3px;background:var(--bd);border-radius:2px;margin:0 auto 12px}
.tp-title{margin:0 18px 12px;font-size:14px;font-weight:600}
.tp-row{display:flex;align-items:center;gap:12px;padding:0 18px 12px;border-bottom:1px solid var(--bd)}
.tp-lbl{font-size:12px;font-weight:500;color:var(--ink2);min-width:50px}
.tp-input,.tp-select{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--ink);padding:8px 10px;font-size:12px;outline:none}
.tp-color-swatch{width:36px;height:36px;border-radius:6px;border:2px solid var(--bd);cursor:pointer;-webkit-tap-highlight-color:transparent}
.tp-color-swatch.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--bg),0 0 8px rgba(242,239,233,.3)}
.tp-pos-grid{display:grid;grid-template-columns:repeat(3,32px);gap:4px;margin:0 auto}
.tp-pos-btn{width:32px;height:32px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--ink2)}
.tp-pos-btn.on{border-color:var(--ink);background:rgba(212,166,84,.15);color:var(--ink)}
.tp-btn-row{display:flex;gap:8px;padding:12px 18px;border-top:1px solid var(--bd)}
.tp-btn{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:8px;color:var(--ink);padding:10px;font-size:12px;font-weight:600;cursor:pointer}
.tp-btn.done{background:var(--ink);color:#0A0A0A}
#lb{position:fixed;inset:0;z-index:50;background:#000;display:none;flex-direction:column;padding-top:var(--st);padding-bottom:var(--sb)}
#lb.open{display:flex}
.lb-img{flex:1;display:flex;align-items:center;justify-content:center;padding:12px}
.lb-img canvas{max-width:100%;max-height:100%;display:block}
.lb-bar{flex-shrink:0;background:rgba(0,0,0,.9);border-top:1px solid rgba(255,255,255,.06);padding:12px 18px;display:flex;align-items:center;gap:10px}
.lb-x{width:34px;height:34px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;color:var(--ink2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px}
.lb-dl{font-size:11px;font-weight:600;background:var(--ink);color:#0A0A0A;border:none;border-radius:10px;padding:9px 18px;cursor:pointer}
#install-bar{display:none;position:fixed;bottom:calc(var(--sb)+12px);left:16px;right:16px;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:12px 16px;z-index:45;align-items:center;gap:12px}
#install-bar.on{display:flex}
.ib-txt{flex:1;font-size:12px;color:var(--ink2)}
#col-photos{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding:10px 0;-webkit-overflow-scrolling:touch}
  </style>
</head>
<body>

<div id="app">
  <div class="nav">
    <div class="nav-logo"><strong>Grade</strong><span>-Design</span></div>
    <div class="nav-tagline">Cinematic · Collages · Stories</div>
  </div>

  <div class="tab-bar" id="tab-bar">
    <div class="tab on" data-tab="grade">Grade</div>
    <div class="tab" data-tab="collage">Collage</div>
  </div>

  <div id="tabs">
    <div class="tab-page on" id="grade-tab">
      <p class="sec-lbl" style="margin-top:0">Upload Photo or Video</p>
      <input type="file" id="file-input" accept="image/*,video/*" style="display:none">
      <button id="upload-btn" style="width:100%;background:var(--ink);color:#0A0A0A;border:none;border-radius:12px;padding:12px;font-weight:600;font-size:12px;cursor:pointer;margin-bottom:12px">📤 Choose Photo/Video</button>

      <div class="c-carousel" id="carousel"></div>
      <div class="dots" id="dots"></div>
      <div class="ratio-strip" id="ratio-strip"></div>

      <p class="sec-lbl">Grade</p>
      <div class="style-grid" id="grade-grid"></div>

      <div class="action-row">
        <button id="lb-btn" class="btn-rnd" style="flex:0.6">View</button>
        <button id="txt-btn" class="btn-rnd">✍️ Text</button>
        <button id="save-btn" class="btn-rnd">💾 Save</button>
      </div>
    </div>

    <div class="tab-page" id="collage-tab">
      <p class="sec-lbl" style="margin-top:0">Select Photos (2+)</p>
      <input type="file" id="col-file-input" accept="image/*" multiple style="display:none">
      <button id="col-upload-btn" style="width:100%;background:var(--ink);color:#0A0A0A;border:none;border-radius:12px;padding:12px;font-weight:600;font-size:12px;cursor:pointer;margin-bottom:12px">📸 Add Photos</button>

      <div id="col-photos"></div>

      <p class="sec-lbl">Grade</p>
      <div class="col-grade-row" id="col-grade-row"></div>

      <p class="sec-lbl">Collage Style</p>
      <div class="style-grid" id="style-grid"></div>

      <div class="action-row">
        <button class="btn-rnd" id="btn-rnd" style="flex:0">🔄</button>
        <button class="btn-gen" id="btn-gen" disabled>Generate</button>
      </div>

      <div class="col-result" id="col-result">
        <div class="col-result-wrap">
          <canvas id="col-canvas"></canvas>
          <div class="col-spin-ov" id="col-spin"><div class="sk-r"></div></div>
        </div>
        <button class="col-dl-btn" id="col-dl">Save to Photos</button>
      </div>
    </div>
  </div>
</div>

<div id="tp-overlay"></div>
<div id="txt-panel">
  <div class="tp-handle"></div>
  <p class="tp-title">Add Text</p>
  <div class="tp-row"><span class="tp-lbl">Text</span><input class="tp-input" id="tp-text" type="text" placeholder="Your text…"></div>
  <div class="tp-row"><span class="tp-lbl">Font</span><select class="tp-select" id="tp-font"><option>Inter</option><option>DM Serif Display</option><option>Georgia</option><option>Courier New</option><option>Impact</option></select></div>
  <div class="tp-row"><span class="tp-lbl">Size</span><input type="number" id="tp-size" value="72" min="12" max="300" style="flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--ink);padding:8px 10px;font-size:12px"></div>
  <div class="tp-row"><span class="tp-lbl">Color</span><div style="display:flex;gap:6px;flex:1" id="tp-colors"></div></div>
  <div class="tp-row"><span class="tp-lbl">Opacity</span><input type="range" id="tp-opacity" min="10" max="100" value="100" style="flex:1"></div>
  <div class="tp-row"><span class="tp-lbl">Weight</span><select class="tp-select" id="tp-weight"><option value="400">Regular</option><option value="500">Medium</option><option value="600">Semi Bold</option><option value="700">Bold</option></select></div>
  <div class="tp-row" style="border:none"><span class="tp-lbl">Position</span><div class="tp-pos-grid" id="tp-pos-grid"></div></div>
  <div class="tp-btn-row">
    <button class="tp-btn" id="tp-close">Cancel</button>
    <button class="tp-btn done" id="tp-done">Done</button>
  </div>
</div>

<div id="lb">
  <div class="lb-img"><canvas id="lb-canvas"></canvas></div>
  <div class="lb-bar"><span style="flex:1;font-size:13px;font-weight:500;color:var(--ink)">Photo</span><button class="lb-dl" id="lb-dl">Save</button><div class="lb-x" id="lb-x">✕</div></div>
</div>

<div id="install-bar"><div class="ib-txt"><strong>Grade-Design</strong><br>Add to home screen</div><button style="background:var(--ink);color:#0A0A0A;border:none;border-radius:8px;padding:8px 16px;font-weight:600;font-size:11px;cursor:pointer" id="install-btn">Install</button></div>

<script>
document.addEventListener('DOMContentLoaded',function(){

const STYLES=[{id:'none',name:'No Grade',fn:(r,g,b)=>[r,g,b]},{id:'teal-orange',name:'Teal & Orange',fn:(r,g,b,L)=>{const c=Math.pow(L,1.1);return[Math.min(1,r*(1-.2*c)+.3*c),g,Math.min(1,b+(1-L)*.25)]}},{id:'kashmir',name:'Kashmir',fn:(r,g,b)=>[Math.max(0,r-.05),g,Math.min(1,b+.1)]},{id:'golden',name:'Golden Hour',fn:(r,g,b)=>[Math.min(1,r+.1),Math.min(1,g+.08),Math.max(0,b-.08)]},{id:'kodak',name:'Kodak 500T',fn:(r,g,b)=>[Math.min(1,r+.05),g*1.02,Math.max(0,b-.03)]},{id:'nordic',name:'Nordic Cold',fn:(r,g,b)=>[Math.max(0,r-.08),Math.min(1,g+.05),Math.min(1,b+.12)]},{id:'vintage',name:'Vintage Print',fn:(r,g,b)=>[Math.min(1,r+.08),Math.min(1,g+.06),Math.max(0,b-.04)]},{id:'silver',name:'Silver Bypass',fn:(r,g,b,L)=>{const s=.15*Math.max(0,L-.3);return[r+s,g+s,b+s]}},{id:'mist',name:'Morning Mist',fn:(r,g,b)=>[Math.min(1,r+.1),Math.min(1,g+.08),Math.min(1,b+.12)]},{id:'dusk',name:'Blue Dusk',fn:(r,g,b)=>[Math.max(0,r-.08),Math.max(0,g-.05),Math.min(1,b+.15)]},{id:'ember',name:'Ember',fn:(r,g,b)=>[Math.min(1,r+.15),g,Math.max(0,b-.1)]},{id:'velvia',name:'Fuji Velvia',fn:(r,g,b,L)=>{const boost=1.3;return[Math.min(1,r*boost),Math.min(1,g*boost),Math.min(1,b*boost)]}},{id:'bw',name:'B&W',fn:(r,g,b,L)=>[L,L,L]}];

const COL_STYLES=[{id:'polaroid-scatter',name:'Polaroid Scatter',icon:'📷'},{id:'film-strip',name:'Film Strip',icon:'🎬'},{id:'magazine',name:'Magazine',icon:'📰'},{id:'moodboard',name:'Moodboard',icon:'🎨'},{id:'photo-dump',name:'Photo Dump',icon:'📱'},{id:'triptych',name:'Triptych',icon:'🎞'},{id:'cinescope',name:'Cinescope',icon:'🎬'},{id:'golden-ratio',name:'Golden Ratio',icon:'✨'},{id:'polaroid-wall',name:'Polaroid Wall',icon:'📸'},{id:'arch-diptych',name:'Arch Diptych',icon:'🏛'},{id:'broken-grid',name:'Broken Grid',icon:'⚡'},{id:'ig-carousel',name:'IG Carousel',icon:'📹'}];

const COLORS=[{name:'White',hex:'#ffffff'},{name:'Cream',hex:'#f2efe9'},{name:'Black',hex:'#0a0a0a'},{name:'Gold',hex:'#d4a654'},{name:'Teal',hex:'#7bafc4'},{name:'Rose',hex:'#d4938a'},{name:'Green',hex:'#8ab36b'}];

let photos=[],currentIdx=0,panOffsets={},gradeIdx=0,layers=[];
let locationStamp={lat:null,lon:null,city:'',date:''};
let colPhotos=[],colGrade=STYLES[0],colStyle=COL_STYLES[0],colGradeIdx=0;

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',e=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab-page').forEach(p=>p.classList.remove('on'));

STYLES.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='btn-rnd '+(!i?'on':'');
  btn.textContent=s.name;
  btn.addEventListener('click',()=>{

  btn.addEventListener('click',()=>{

STYLES.forEach((s,i)=>{
  const btn=document.createElement('button');
  btn.className='btn-rnd '+(i===0?'on':'');
  btn.textContent=s.name;
  btn.addEventListener('click',()=>{

['16:9','9:16','1:1','2:1','2.39:1','2.35:1','1.85:1','4:3','4:5'].forEach(r=>{
  const btn=document.createElement('button');
  btn.className='ratio-btn '+(r==='16:9'?'on':'');

[[0,0,'↖'],[1,0,'⬆'],[2,0,'↗'],[0,1,'⬅'],[1,1,'⏺'],[2,1,'➡'],[0,2,'↙'],[1,2,'⬇'],[2,2,'↘']].forEach(([x,y,icon])=>{

document.getElementById('upload-btn').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('col-upload-btn').addEventListener('click',()=>document.getElementById('col-file-input').click());

async function readExifGPS(file){
  try{
    const buf=await file.arrayBuffer();
    const view=new DataView(buf);
    if(view.getUint16(0)!==0xFFD8)return{};
    let offset=2;
    while(offset<buf.byteLength){
      if(view.getUint8(offset)!==0xFF)break;
      const marker=view.getUint8(offset+1);
      if(marker===0xE1){
        const len=view.getUint16(offset+2,false);
        if(buf.slice(offset+4,offset+10).toString()==='App1'){
          return parseExifGPS(new DataView(buf,offset+10,len-8));
        }
      }
      offset+=2+view.getUint16(offset+2,false);
    }
  }catch(e){}
  return{};
}

function parseExifGPS(dv){
  if(dv.getUint32(0)!==0x45786966)return{};
  let offset=8;
  const ifdOffset=dv.getUint32(offset,false);
  offset=ifdOffset;
  const dirCount=dv.getUint16(offset,false);
  offset+=2;
  let gpsIfdOffset=null;
  for(let i=0;i<dirCount;i++){
    const tag=dv.getUint16(offset,false);
    if(tag===0x8825){gpsIfdOffset=dv.getUint32(offset+8,false);break}
    offset+=12;
  }
  if(!gpsIfdOffset)return{};
  offset=gpsIfdOffset;
  const gpsCount=dv.getUint16(offset,false);
  offset+=2;
  let lat=null,lon=null;
  for(let i=0;i<gpsCount;i++){
    const tag=dv.getUint16(offset,false);
    if(tag===2&&lat===null)lat=readGPSCoord(dv,dv.getUint32(offset+8,false));
    else if(tag===4&&lon===null)lon=readGPSCoord(dv,dv.getUint32(offset+8,false));
    offset+=12;
  }
  return lat&&lon?{lat,lon}:{};
}

function readGPSCoord(dv,offset){
  const d=dv.getUint32(offset,false)/dv.getUint32(offset+4,false);
  const m=dv.getUint32(offset+8,false)/dv.getUint32(offset+12,false);
  const s=dv.getUint32(offset+16,false)/dv.getUint32(offset+20,false);
  return d+m/60+s/3600;
}

async function readExifDate(file){
  try{
    const buf=await file.arrayBuffer();
    const view=new DataView(buf);
    if(view.getUint16(0)!==0xFFD8)return'';
    let offset=2;
    while(offset<buf.byteLength){
      if(view.getUint8(offset)!==0xFF)break;
      const marker=view.getUint8(offset+1);
      if(marker===0xE1){
        const len=view.getUint16(offset+2,false);
        if(buf.slice(offset+4,offset+10).toString()==='App1'){
          return parseExifDate(new DataView(buf,offset+10,len-8));
        }
      }
      offset+=2+view.getUint16(offset+2,false);
    }
  }catch(e){}
  return'';
}

function parseExifDate(dv){
  if(dv.getUint32(0)!==0x45786966)return'';
  let offset=8;
  const ifdOffset=dv.getUint32(offset,false);
  offset=ifdOffset;
  const dirCount=dv.getUint16(offset,false);
  offset+=2;
  for(let i=0;i<dirCount;i++){
    const tag=dv.getUint16(offset,false);
    if(tag===0x0132||tag===0x9003){
      const dataOffset=dv.getUint32(offset+8,false);
      let dateStr='';
      for(let j=0;j<Math.min(20,dv.getUint32(offset+4,false));j++){
        dateStr+=String.fromCharCode(dv.getUint8(dataOffset+j));
      }
      const match=dateStr.match(/(\d{4}):(\d{2}):(\d{2})/);
      if(match)return`${match[1]}-${match[2]}-${match[3]}`;
    }
    offset+=12;
  }
  return'';
}

function drawLocationStamp(ctx,w,h,city,date){
  if(!city&&!date)return;
  const fontSize=Math.max(12,Math.floor(h*0.025));
  ctx.font=`500 ${fontSize}px Inter,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.textBaseline='bottom';
  const padding=fontSize*0.8;
  const lineHeight=fontSize*1.5;
  let y=h-padding-lineHeight;
  if(date){
    const dateStr=new Date(date).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});
    ctx.fillText(dateStr,padding,y);
    y-=lineHeight;
  }
  if(city)ctx.fillText(`📍 ${city}`,padding,y);
}

function buildCarousel(){
  const car=document.getElementById('carousel');
  car.innerHTML='';
  photos.forEach((p,i)=>{
    const slide=document.createElement('div');
    slide.className='c-slide';
    const img=document.createElement('div');
    img.className='c-img';
    const c=document.createElement('canvas');
    c.width=400;c.height=400;
    const ctx=c.getContext('2d');
    ctx.fillStyle='var(--sf)';
    ctx.fillRect(0,0,c.width,c.height);
    const ratio=getRatio();
    fitImage(ctx,p.canvas,c.width,c.height,ratio,0);
    img.appendChild(c);
    slide.appendChild(img);
    car.appendChild(slide);
  });
  updateDots();
  car.addEventListener('scroll',updateDots);
}

function getRatio(){
  const btn=document.querySelector('.ratio-btn.on');
  return btn?btn.textContent:'16:9';
}

function calcAspect(w,h,ratio){
  const [rw,rh]=ratio.split(':').map(Number);
  const target=rw/rh;
  if(w/h>target)return[h*target,h];
  else return[w,w/target];
}

function fitImage(ctx,img,cw,ch,ratio,pan){
  ctx.fillStyle='var(--sf)';
  ctx.fillRect(0,0,cw,ch);
  const [w,h]=calcAspect(img.width,img.height,ratio);
  const x=(cw-w)/2+pan;
  const y=(ch-h)/2;
  ctx.drawImage(img,x,y,w,h);
}

function updateDots(){
  const car=document.getElementById('carousel');
  const idx=Math.round(car.scrollLeft/(car.scrollWidth/photos.length));
  currentIdx=Math.min(idx,photos.length-1);
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===currentIdx));
}

function renderCurrent(){
  if(!photos[0])return;
  const slides=document.querySelectorAll('.c-slide');
  slides.forEach((slide,i)=>{
    const canvas=slide.querySelector('canvas');
    const ctx=canvas.getContext('2d');
    const ratio=getRatio();
    canvas.width=canvas.offsetWidth*devicePixelRatio;
    canvas.height=canvas.offsetHeight*devicePixelRatio;
    ctx.scale(devicePixelRatio,devicePixelRatio);
    const w=canvas.width/devicePixelRatio;
    const h=canvas.height/devicePixelRatio;
    fitImage(ctx,photos[i].canvas,w,h,ratio,panOffsets[ratio]||0);
    applyGrade(ctx,photos[i].canvas,w,h,STYLES[gradeIdx],w,h);
  });
}

function applyGrade(ctx,img,imgW,imgH,grade,canW,canH){
  const iCanvas=document.createElement('canvas');
  iCanvas.width=imgW;iCanvas.height=imgH;
  const iCtx=iCanvas.getContext('2d');
  const ratio=getRatio();
  const [aw,ah]=calcAspect(img.width,img.height,ratio);
  const x=(imgW-aw)/2+(panOffsets[ratio]||0);
  const y=(imgH-ah)/2;
  iCtx.drawImage(img,x,y,aw,ah);
  const id=iCtx.getImageData(0,0,imgW,imgH);
  const d=id.data;
  for(let i=0;i<d.length;i+=4){
    let r=d[i]/255,g=d[i+1]/255,b=d[i+2]/255;
    const L=.299*r+.587*g+.114*b;
    const curve=1.06,mid=0.5,y0=mid-(curve-1)*mid,y1=mid+(curve-1)*(1-mid);
    const yL=y0+(L-mid)*(y1-y0);
    r=Math.max(0,Math.min(1,r*yL/Math.max(.01,L)));
    g=Math.max(0,Math.min(1,g*yL/Math.max(.01,L)));
    b=Math.max(0,Math.min(1,b*yL/Math.max(.01,L)));
    [r,g,b]=grade.fn(r,g,b,L);
    d[i]=Math.max(0,Math.min(255,r*255));
    d[i+1]=Math.max(0,Math.min(255,g*255));
    d[i+2]=Math.max(0,Math.min(255,b*255));
  }
  iCtx.putImageData(id,0,0);
  const grd=iCtx.createRadialGradient(imgW/2,imgH/2,0,imgW/2,imgH/2,Math.hypot(imgW,imgH)/2);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(1,'rgba(0,0,0,.38)');
  iCtx.fillStyle=grd;
  iCtx.fillRect(0,0,imgW,imgH);
  ctx.drawImage(iCanvas,0,0);
  layers.forEach(l=>drawTextLayer(ctx,l,imgW,imgH));
  drawLocationStamp(ctx,canW,canH,locationStamp.city,locationStamp.date);
}

function drawTextLayer(ctx,l,w,h){
  const posMap=[[0,0],[.5,0],[1,0],[0,.5],[.5,.5],[1,.5],[0,1],[.5,1],[1,1]];
  const [px,py]=l.pos.split(',').map(Number);
  const [x,y]=[posMap[px+py*3][0]*w,posMap[px+py*3][1]*h];
  ctx.font=`${l.weight} ${l.size}px ${l.font}`;
  ctx.fillStyle=l.color;
  ctx.globalAlpha=l.opacity/100;
  ctx.textAlign=['left','center','right'][px];
  ctx.textBaseline=['top','middle','bottom'][py];
  ctx.shadowBlur=4;ctx.shadowColor='rgba(0,0,0,.5)';
  ctx.fillText(l.text,x,y);
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}

document.getElementById('tp-close').addEventListener('click',()=>{
  document.getElementById('txt-panel').classList.remove('on');
  document.getElementById('tp-overlay').classList.remove('on');
});

document.getElementById('tp-done').addEventListener('click',()=>{
  const text=document.getElementById('tp-text').value.trim();
  if(!text){document.getElementById('txt-panel').classList.remove('on');document.getElementById('tp-overlay').classList.remove('on');return;}
  const layer={text,font:document.getElementById('tp-font').value,size:parseInt(document.getElementById('tp-size').value),weight:document.getElementById('tp-weight').value,color:document.getElementById('tp-text').dataset.color||'#ffffff',opacity:parseInt(document.getElementById('tp-opacity').value),pos:document.getElementById('tp-text').dataset.pos||'4'};
  layers=[layer];
  renderCurrent();
  document.getElementById('txt-panel').classList.remove('on');
  document.getElementById('tp-overlay').classList.remove('on');
  document.getElementById('tp-text').value='';
});

document.getElementById('lb-x').addEventListener('click',()=>document.getElementById('lb').classList.remove('open'));

function dlCanvas(canvas,name){
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`${name}.png`;
    a.click();
    URL.revokeObjectURL(url);
  },'image/png');
}

document.getElementById('btn-rnd').addEventListener('click',()=>{
  colPhotos.sort(()=>Math.random()-.5);
  colGradeIdx=Math.floor(Math.random()*STYLES.length);
  colGrade=STYLES[colGradeIdx];
  colStyle=COL_STYLES[Math.floor(Math.random()*COL_STYLES.length)];
  generateCollage();
});

document.getElementById('btn-gen').addEventListener('click',generateCollage);

function generateCollage(){
  const btn=document.getElementById('btn-gen');
  btn.disabled=true;
  document.getElementById('col-spin').classList.add('on');
  const out=document.getElementById('col-canvas');
  out.width=1080;out.height=1350;
  const ctx=out.getContext('2d');
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(0,0,1080,1350);
  colPhotos.slice(0,3).forEach((p,i)=>{
    ctx.drawImage(p.canvas,i*360,100,360,600);
  });
  document.getElementById('col-result').classList.add('on');
  document.getElementById('col-spin').classList.remove('on');
  btn.disabled=false;
}

document.getElementById('col-dl').addEventListener('click',()=>{
  dlCanvas(document.getElementById('col-canvas'),`collage-${colStyle.id}`);
});

document.getElementById('col-file-input').addEventListener('change',async e=>{
  colPhotos=[];
  for(const f of e.target.files){
    const fr=new FileReader();
    await new Promise(resolve=>{
      fr.onload=async ev=>{
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
          c.getContext('2d').drawImage(img,0,0);
          colPhotos.push({canvas:c});
          document.getElementById('btn-gen').disabled=colPhotos.length<2;
          const strip=document.getElementById('col-photos');
          const thumb=document.createElement('div');
          thumb.style.cssText='width:80px;height:80px;border:2px solid var(--bd);border-radius:8px;flex-shrink:0;overflow:hidden';
          const tc=document.createElement('canvas');tc.width=80;tc.height=80;
          const ctx=tc.getContext('2d');
          const aw=Math.min(img.width,img.height);
          ctx.drawImage(img,(img.width-aw)/2,(img.height-aw)/2,aw,aw,0,0,80,80);
          thumb.appendChild(tc);
          strip.appendChild(thumb);
          resolve();
        };
        img.src=ev.target.result;
      };
      fr.readAsDataURL(f);
    });
  }
});

document.getElementById('file-input').addEventListener('change',async e=>{
  if(!e.target.files[0])return;
  const f=e.target.files[0];
  const fr=new FileReader();
  fr.onload=async ev=>{
    const img=new Image();
    img.onload=async()=>{
      const canvas=document.createElement('canvas');
      canvas.width=img.width;canvas.height=img.height;
      canvas.getContext('2d').drawImage(img,0,0);
      const gps=await readExifGPS(f);
      const exifDate=await readExifDate(f);
      photos=[{canvas,gps,fname:f.name,exifDate}];
      if(gps.lat&&gps.lon){
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${gps.lat}&lon=${gps.lon}&format=json`);
          const d=await r.json();
          const city=d.address?.city||d.address?.town||d.address?.village||`${gps.lat.toFixed(2)}, ${gps.lon.toFixed(2)}`;
          locationStamp={lat:gps.lat,lon:gps.lon,city,date:exifDate||''};
        }catch(e){
          locationStamp={lat:gps.lat,lon:gps.lon,city:`${gps.lat.toFixed(2)}, ${gps.lon.toFixed(2)}`,date:exifDate||''};
        }
      }else if(exifDate){
        locationStamp={lat:null,lon:null,city:'',date:exifDate};
      }
      currentIdx=0;panOffsets={};buildCarousel();renderCurrent();
    };
    img.onerror=()=>{
      const video=document.createElement('video');
      video.onloadedmetadata=()=>{
        const c=document.createElement('canvas');c.width=video.videoWidth;c.height=video.videoHeight;
        const ctx=c.getContext('2d');video.currentTime=video.duration*0.1;
        video.onseeked=()=>{ctx.drawImage(video,0,0);photos=[{canvas:c}];buildCarousel();renderCurrent()};
      };
      video.src=ev.target.result;
    };
    img.src=ev.target.result;
  };
  fr.readAsArrayBuffer(f);
});
